apiVersion: 1

datasources:
  # PostgreSQL — detailed queries, OLTP data
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: economic_data
    user: ${POSTGRES_USER:-economic_user}
    secureJsonData:
      password: ${POSTGRES_PASSWORD:-economic_password}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 600
      postgresVersion: 1600  # v16
      timescaledb: false

  # ClickHouse — fast analytics, OLAP queries, dashboards
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    jsonData:
      defaultDatabase: gold
      port: 9000
      protocol: native
      server: clickhouse
      username: ${CLICKHOUSE_USER:-default}
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD:-}

  # Prometheus — infrastructure metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 10s
