version: 2

models:
  - name: stg_fred_indicators
    description: "Cleaned and typed FRED economic indicators"
    columns:
      - name: series_id
        description: "FRED series identifier"
        tests:
          - not_null
      - name: observation_date
        description: "Observation date"
        tests:
          - not_null
      - name: value
        description: "Indicator value"
        tests:
          - not_null
      - name: indicator_category
        description: "Indicator category (gdp, inflation, employment, etc.)"
        tests:
          - accepted_values:
              values: ['gdp', 'inflation', 'employment', 'interest_rates', 'money_supply', 'other']
      - name: is_valid_observation
        description: "Data quality flag"
        tests:
          - accepted_values:
              values: [true]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - series_id
            - observation_date

  - name: stg_worldbank_indicators
    description: "Cleaned and typed World Bank indicators"
    columns:
      - name: country_code
        description: "ISO country code"
        tests:
          - not_null
      - name: indicator_code
        description: "World Bank indicator code"
        tests:
          - not_null
      - name: year
        description: "Observation year"
        tests:
          - not_null
      - name: value
        description: "Indicator value"
        tests:
          - not_null
      - name: indicator_category
        description: "Indicator category"
      - name: is_valid_observation
        description: "Data quality flag"
        tests:
          - accepted_values:
              values: [true]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - country_code
            - indicator_code
            - year
