version: 2

models:
  - name: stg_binance_trades
    description: "Cleaned and typed Binance trade data"
    columns:
      - name: trade_id
        description: "Unique trade identifier"
        tests:
          - not_null
          - unique
      - name: symbol
        description: "Trading pair symbol"
        tests:
          - not_null
      - name: price
        description: "Trade price in USD"
        tests:
          - not_null
      - name: quantity
        description: "Trade quantity"
        tests:
          - not_null
      - name: trade_value_usd
        description: "Total trade value (price * quantity)"
      - name: trade_timestamp
        description: "Trade timestamp"
        tests:
          - not_null
      - name: is_valid_trade
        description: "Data quality flag"
        tests:
          - accepted_values:
              values: [true]

  - name: stg_coingecko_prices
    description: "Cleaned and typed CoinGecko price data"
    columns:
      - name: coin_id
        description: "CoinGecko coin identifier"
        tests:
          - not_null
      - name: symbol
        description: "Coin symbol"
        tests:
          - not_null
      - name: current_price_usd
        description: "Current price in USD"
        tests:
          - not_null
      - name: market_cap_usd
        description: "Market capitalization in USD"
      - name: volume_24h_usd
        description: "24h trading volume in USD"
      - name: price_date
        description: "Price observation date"
        tests:
          - not_null
      - name: is_valid_price
        description: "Data quality flag"
        tests:
          - accepted_values:
              values: [true]
