# =============================================================================
# Shared Databases Stack for Dokploy
# Economic Data Analytics Platform
# =============================================================================
# Deploy this as "shared-databases" project in Dokploy
# All databases in one stack for easier management
# =============================================================================

version: '3.8'

services:
  # =============================================================================
  # PostgreSQL - Main OLTP Database
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: shared-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-economic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-economic_data}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-economic_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
    networks:
      - dokploy-network
    labels:
      - "dokploy.name=PostgreSQL"
      - "dokploy.description=Main relational database"

  # =============================================================================
  # ClickHouse - OLAP Analytics Database
  # =============================================================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: shared-clickhouse
    restart: always
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-economic_data}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    networks:
      - dokploy-network
    labels:
      - "dokploy.name=ClickHouse"
      - "dokploy.description=OLAP analytics database"

  # =============================================================================
  # Redis - Cache & Session Store
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: shared-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - dokploy-network
    labels:
      - "dokploy.name=Redis"
      - "dokploy.description=Cache and session store"

  # =============================================================================
  # MinIO - S3-Compatible Object Storage (Data Lake)
  # =============================================================================
  minio:
    image: minio/minio:latest
    container_name: shared-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    networks:
      - dokploy-network
    labels:
      - "dokploy.name=MinIO"
      - "dokploy.description=Object storage for data lake"
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`minio.${DOMAIN}`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.minio.loadbalancer.server.port=9001"

  # Initialize MinIO buckets
  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb myminio/bronze --ignore-existing;
      mc mb myminio/silver --ignore-existing;
      mc mb myminio/gold --ignore-existing;
      mc mb myminio/raw-data --ignore-existing;
      mc mb myminio/dbt-artifacts --ignore-existing;
      echo 'MinIO buckets created successfully';
      exit 0;
      "
    networks:
      - dokploy-network

  # =============================================================================
  # Kafka - Message Queue (for streaming)
  # =============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: shared-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - dokploy-network

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: shared-kafka
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
    networks:
      - dokploy-network
    labels:
      - "dokploy.name=Kafka"
      - "dokploy.description=Message queue for streaming data"

  # =============================================================================
  # Hive Metastore — Schema catalog for Trino → MinIO
  # =============================================================================
  hive-metastore:
    image: apache/hive:4.0.1
    container_name: shared-hive-metastore
    restart: always
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/hive_metastore
        -Djavax.jdo.option.ConnectionUserName=${POSTGRES_USER:-economic_user}
        -Djavax.jdo.option.ConnectionPassword=${POSTGRES_PASSWORD}
    ports:
      - "9083:9083"
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init-hive:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    networks:
      - dokploy-network
    labels:
      - "dokploy.name=Hive Metastore"
      - "dokploy.description=Schema catalog for Trino"
    profiles:
      - trino

  # Create hive_metastore database in PostgreSQL
  postgres-init-hive:
    image: postgres:16-alpine
    container_name: shared-postgres-init-hive
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      psql -h postgres -U ${POSTGRES_USER:-economic_user} -d ${POSTGRES_DB:-economic_data} -tc \"SELECT 1 FROM pg_database WHERE datname = 'hive_metastore'\" | grep -q 1 || psql -h postgres -U ${POSTGRES_USER:-economic_user} -d ${POSTGRES_DB:-economic_data} -c 'CREATE DATABASE hive_metastore;';
      exit 0;
      "
    networks:
      - dokploy-network
    profiles:
      - trino

  # =============================================================================
  # Trino — Federated SQL query engine over MinIO data lake
  # =============================================================================
  trino:
    image: trinodb/trino:latest
    container_name: shared-trino
    restart: always
    ports:
      - "8085:8080"
    volumes:
      - ../../trino/etc:/etc/trino:ro
      - ../../trino/conf:/etc/trino/conf:ro
    depends_on:
      - hive-metastore
      - minio
    healthcheck:
      test: ["CMD", "trino", "--execute", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
    networks:
      - dokploy-network
    labels:
      - "dokploy.name=Trino"
      - "dokploy.description=Federated SQL query engine for data lake"
      - "traefik.enable=true"
      - "traefik.http.routers.trino.rule=Host(`trino.${DOMAIN}`)"
      - "traefik.http.routers.trino.entrypoints=websecure"
      - "traefik.http.routers.trino.tls.certresolver=letsencrypt"
      - "traefik.http.services.trino.loadbalancer.server.port=8080"
    profiles:
      - trino

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
  minio_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  dokploy-network:
    name: dokploy-network
    external: true
