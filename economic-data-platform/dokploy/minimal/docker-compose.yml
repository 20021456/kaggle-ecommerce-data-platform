# =============================================================================
# MINIMAL Deployment for Small VPS (2 vCPU, 4GB RAM)
# Economic Data Analytics Platform
# =============================================================================
# Optimized for: 2 vCPU, 4GB RAM, 40GB Storage
# Removed: ClickHouse, Kafka, Zookeeper, Airflow (too heavy)
# =============================================================================

version: '3.8'

services:
  # =============================================================================
  # PostgreSQL - Main Database (handles both OLTP and basic analytics)
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: economic-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-economic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-economic_data}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Performance tuning for low memory
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c work_mem=16MB
      -c max_connections=50
      -c random_page_cost=1.1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-economic_user}"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
        reservations:
          memory: 512M
    networks:
      - app-network

  # =============================================================================
  # Redis - Cache (minimal config)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: economic-redis
    restart: always
    command: >
      redis-server 
      --appendonly yes 
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.25'
        reservations:
          memory: 64M
    networks:
      - app-network

  # =============================================================================
  # API Application (lightweight)
  # =============================================================================
  api:
    build:
      context: ../..
      dockerfile: Dockerfile.minimal
    container_name: economic-api
    restart: always
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: WARNING
      
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      
      # API Keys
      FRED_API_KEY: ${FRED_API_KEY:-}
      BEA_API_KEY: ${BEA_API_KEY:-}
      BLS_API_KEY: ${BLS_API_KEY:-}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      
      # Rate limiting (stricter for small server)
      API_RATE_LIMIT_REQUESTS: 30
      API_RATE_LIMIT_PERIOD: 60
      
      # Workers (reduce for low CPU)
      WEB_CONCURRENCY: 2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
        reservations:
          memory: 256M
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # =============================================================================
  # Grafana - Monitoring (optional, lightweight config)
  # =============================================================================
  grafana:
    image: grafana/grafana:10.2.3-ubuntu
    container_name: economic-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.${DOMAIN}"
      # Reduce memory usage
      GF_SERVER_ENABLE_GZIP: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SNAPSHOTS_EXTERNAL_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    profiles:
      - monitoring

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  app-network:
    driver: bridge
