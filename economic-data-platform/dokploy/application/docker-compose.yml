# =============================================================================
# Application Stack for Dokploy
# Economic Data Analytics Platform
# =============================================================================
# Deploy this as "economic-data-platform" project in Dokploy
# Requires "shared-databases" project to be running
# =============================================================================

version: '3.8'

services:
  # =============================================================================
  # Main API Application
  # =============================================================================
  api:
    build:
      context: ../..
      dockerfile: Dockerfile.dokploy
    container_name: economic-api
    restart: always
    environment:
      # Application
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      
      # Database connections (connect to shared-databases network)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@shared-postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@shared-redis:6379/0
      CLICKHOUSE_HOST: shared-clickhouse
      CLICKHOUSE_PORT: 8123
      
      # MinIO/S3
      MINIO_ENDPOINT: shared-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: "false"
      
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: shared-kafka:29092
      
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      
      # API Keys
      FRED_API_KEY: ${FRED_API_KEY}
      BEA_API_KEY: ${BEA_API_KEY}
      BLS_API_KEY: ${BLS_API_KEY}
      CENSUS_API_KEY: ${CENSUS_API_KEY}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY}
      CRYPTOCOMPARE_API_KEY: ${CRYPTOCOMPARE_API_KEY}
      
      # Rate limiting
      API_RATE_LIMIT_REQUESTS: 100
      API_RATE_LIMIT_PERIOD: 60
      
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 1G
          cpus: '1'
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.economic-api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.economic-api.entrypoints=websecure"
      - "traefik.http.routers.economic-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.economic-api.loadbalancer.server.port=8000"
      - "dokploy.name=Economic API"
      - "dokploy.description=Main REST API for Economic Data Platform"

  # =============================================================================
  # Data Ingestion Worker
  # =============================================================================
  ingestion-worker:
    build:
      context: ../..
      dockerfile: Dockerfile.dokploy
    container_name: economic-ingestion
    restart: always
    command: ["python", "-m", "src.ingestion.run_all"]
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@shared-postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@shared-redis:6379/0
      MINIO_ENDPOINT: shared-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      KAFKA_BOOTSTRAP_SERVERS: shared-kafka:29092
      FRED_API_KEY: ${FRED_API_KEY}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
    networks:
      - dokploy-network
    labels:
      - "dokploy.name=Ingestion Worker"
      - "dokploy.description=Data ingestion background worker"
    profiles:
      - workers

  # =============================================================================
  # Monitoring - Prometheus
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: economic-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    networks:
      - dokploy-network

  # =============================================================================
  # Monitoring - Grafana
  # =============================================================================
  grafana:
    image: grafana/grafana:10.2.3
    container_name: economic-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.${DOMAIN}"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

volumes:
  prometheus_data:
  grafana_data:

networks:
  dokploy-network:
    external: true
