# =============================================================================
# PostgreSQL Service for Dokploy
# Economic Data Analytics Platform
# =============================================================================
# Deploy this as a separate service in Dokploy
# =============================================================================

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shared-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-economic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-economic_data}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-economic_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
        reservations:
          memory: 1G
          cpus: '0.5'
    networks:
      - dokploy-network

volumes:
  postgres_data:
    driver: local

networks:
  dokploy-network:
    external: true
