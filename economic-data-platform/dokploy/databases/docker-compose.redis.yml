# =============================================================================
# Redis Service for Dokploy
# Economic Data Analytics Platform
# =============================================================================

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: shared-redis
    restart: always
    command: >
      redis-server 
      --appendonly yes 
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      - dokploy-network

volumes:
  redis_data:
    driver: local

networks:
  dokploy-network:
    external: true
