# dbt Project Configuration
# Economic Data Analytics Platform

name: 'economic_data_platform'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'economic_data_platform'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Model configurations
models:
  economic_data_platform:
    # Staging models
    stagings:
      +materialized: view
      +schema: staging
      crypto:
        +tags: ['crypto', 'staging']
      economic:
        +tags: ['economic', 'staging']
      research:
        +tags: ['research', 'staging']
      ecommerce:
        +tags: ['ecommerce', 'staging']
    
    # Intermediate models
    intermediate:
      +materialized: view
      +schema: intermediate
      crypto:
        +tags: ['crypto', 'intermediate']
      economic:
        +tags: ['economic', 'intermediate']
      combined:
        +tags: ['combined', 'intermediate']
      ecommerce:
        +tags: ['ecommerce', 'intermediate']
    
    # Mart models (final analytics tables)
    marts:
      +materialized: table
      crypto_mart:
        +schema: gold_crypto
        +tags: ['crypto', 'mart']
      economic_mart:
        +schema: gold_economic
        +tags: ['economic', 'mart']
      combined_analytics:
        +schema: gold_combined
        +tags: ['combined', 'mart', 'analytics']
      ecommerce:
        +schema: gold_ecommerce
        +tags: ['ecommerce', 'mart']

# Variables
vars:
  # Date range for data processing
  start_date: '2020-01-01'
  end_date: '{{ run_started_at.strftime("%Y-%m-%d") }}'
  
  # Key cryptocurrencies
  top_crypto_ids: ['bitcoin', 'ethereum', 'tether', 'binancecoin', 'solana']
  
  # Key economic indicators
  key_fred_series: ['GDP', 'UNRATE', 'CPIAUCSL', 'FEDFUNDS', 'DGS10', 'M2SL']
  
  # Major economies for international comparison
  major_economies: ['US', 'CN', 'JP', 'DE', 'GB', 'FR', 'IN', 'IT', 'BR', 'CA']

# Seeds configuration
seeds:
  economic_data_platform:
    +schema: seeds
    +quote_columns: true

# Snapshots configuration
snapshots:
  economic_data_platform:
    +strategy: timestamp
    +updated_at: updated_at

# Test configurations
tests:
  economic_data_platform:
    +severity: warn  # Default severity for tests

# Documentation
docs:
  show: true
