version: 2

sources:
  # =============================================================================
  # CRYPTO DATA SOURCES
  # =============================================================================
  - name: crypto_raw
    description: "Raw cryptocurrency data from various sources"
    database: economic_data
    schema: bronze_crypto
    tables:
      - name: binance_trades
        description: "Real-time trade data from Binance WebSocket"
        columns:
          - name: trade_id
            description: "Unique trade identifier"
            tests:
              - not_null
              - unique
          - name: symbol
            description: "Trading pair symbol (e.g., BTCUSDT)"
            tests:
              - not_null
          - name: price
            description: "Trade price"
            tests:
              - not_null
          - name: quantity
            description: "Trade quantity"
          - name: trade_time
            description: "Trade timestamp"
            tests:
              - not_null
          - name: is_buyer_maker
            description: "Whether buyer is maker"
          - name: ingested_at
            description: "Data ingestion timestamp"
        
      - name: coingecko_prices
        description: "Cryptocurrency prices from CoinGecko API"
        columns:
          - name: coin_id
            description: "CoinGecko coin identifier"
            tests:
              - not_null
          - name: symbol
            description: "Coin symbol"
          - name: name
            description: "Coin name"
          - name: current_price
            description: "Current price in USD"
          - name: market_cap
            description: "Market capitalization"
          - name: total_volume
            description: "24h trading volume"
          - name: price_change_24h
            description: "24h price change"
          - name: price_change_percentage_24h
            description: "24h price change percentage"
          - name: last_updated
            description: "Last update timestamp"
            tests:
              - not_null
          - name: ingested_at
            description: "Data ingestion timestamp"
      
      - name: cryptocompare_ohlcv
        description: "Historical OHLCV data from CryptoCompare"
        columns:
          - name: symbol
            description: "Cryptocurrency symbol"
            tests:
              - not_null
          - name: timestamp
            description: "OHLCV timestamp"
            tests:
              - not_null
          - name: open
            description: "Opening price"
          - name: high
            description: "Highest price"
          - name: low
            description: "Lowest price"
          - name: close
            description: "Closing price"
          - name: volume
            description: "Trading volume"
          - name: ingested_at
            description: "Data ingestion timestamp"
        tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns:
                - symbol
                - timestamp

      - name: fear_greed_index
        description: "Crypto Fear & Greed Index"
        columns:
          - name: timestamp
            description: "Index timestamp"
            tests:
              - not_null
              - unique
          - name: value
            description: "Index value (0-100)"
            tests:
              - not_null
          - name: value_classification
            description: "Classification (Extreme Fear, Fear, Neutral, Greed, Extreme Greed)"
          - name: ingested_at
            description: "Data ingestion timestamp"

  # =============================================================================
  # ECONOMIC DATA SOURCES
  # =============================================================================
  - name: economic_raw
    description: "Raw economic data from various sources"
    database: economic_data
    schema: bronze_economic
    tables:
      - name: fred_series
        description: "Economic time series from FRED API"
        columns:
          - name: series_id
            description: "FRED series identifier"
            tests:
              - not_null
          - name: date
            description: "Observation date"
            tests:
              - not_null
          - name: value
            description: "Series value"
          - name: series_title
            description: "Series title"
          - name: series_units
            description: "Series units"
          - name: series_frequency
            description: "Data frequency"
          - name: ingested_at
            description: "Data ingestion timestamp"
        tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns:
                - series_id
                - date

      - name: bea_gdp
        description: "GDP data from Bureau of Economic Analysis"
        columns:
          - name: table_name
            description: "BEA table name"
          - name: series_code
            description: "Series code"
          - name: line_number
            description: "Line number in table"
          - name: time_period
            description: "Time period"
            tests:
              - not_null
          - name: data_value
            description: "GDP value"
          - name: ingested_at
            description: "Data ingestion timestamp"

      - name: bls_employment
        description: "Employment data from Bureau of Labor Statistics"
        columns:
          - name: series_id
            description: "BLS series identifier"
            tests:
              - not_null
          - name: year
            description: "Year"
            tests:
              - not_null
          - name: period
            description: "Period (M01-M12)"
            tests:
              - not_null
          - name: value
            description: "Employment value"
          - name: footnotes
            description: "Data footnotes"
          - name: ingested_at
            description: "Data ingestion timestamp"

      - name: census_demographics
        description: "Demographic data from US Census"
        columns:
          - name: geography
            description: "Geographic area"
          - name: variable
            description: "Census variable"
          - name: value
            description: "Variable value"
          - name: year
            description: "Census year"
          - name: ingested_at
            description: "Data ingestion timestamp"

  # =============================================================================
  # INTERNATIONAL ECONOMIC DATA
  # =============================================================================
  - name: international_raw
    description: "International economic data"
    database: economic_data
    schema: bronze_international
    tables:
      - name: worldbank_indicators
        description: "World Bank development indicators"
        columns:
          - name: country_code
            description: "ISO country code"
            tests:
              - not_null
          - name: country_name
            description: "Country name"
          - name: indicator_code
            description: "Indicator code"
            tests:
              - not_null
          - name: indicator_name
            description: "Indicator name"
          - name: year
            description: "Year"
            tests:
              - not_null
          - name: value
            description: "Indicator value"
          - name: ingested_at
            description: "Data ingestion timestamp"
        tests:
          - dbt_utils.unique_combination_of_columns:
              combination_of_columns:
                - country_code
                - indicator_code
                - year

      - name: imf_weo
        description: "IMF World Economic Outlook data"
        columns:
          - name: country
            description: "Country name"
          - name: subject_descriptor
            description: "Economic indicator"
          - name: units
            description: "Units of measurement"
          - name: year
            description: "Year"
          - name: value
            description: "Indicator value"
          - name: ingested_at
            description: "Data ingestion timestamp"

      - name: oecd_statistics
        description: "OECD member statistics"
        columns:
          - name: country
            description: "Country code"
          - name: indicator
            description: "Statistical indicator"
          - name: time_period
            description: "Time period"
          - name: value
            description: "Indicator value"
          - name: ingested_at
            description: "Data ingestion timestamp"

  # =============================================================================
  # RESEARCH DATASETS
  # =============================================================================
  - name: research_raw
    description: "Research datasets from academic sources"
    database: economic_data
    schema: bronze_research
    tables:
      - name: aea_icpsr_datasets
        description: "AEA ICPSR replication datasets"
        columns:
          - name: dataset_id
            description: "Dataset identifier"
            tests:
              - not_null
              - unique
          - name: title
            description: "Dataset title"
          - name: authors
            description: "Dataset authors"
          - name: publication_year
            description: "Publication year"
          - name: journal
            description: "Journal name"
          - name: doi
            description: "Digital Object Identifier"
          - name: ingested_at
            description: "Data ingestion timestamp"

      - name: ipums_census
        description: "IPUMS census microdata"
        columns:
          - name: year
            description: "Census year"
          - name: serial
            description: "Household serial number"
          - name: pernum
            description: "Person number"
          - name: age
            description: "Age"
          - name: sex
            description: "Sex"
          - name: race
            description: "Race"
          - name: income
            description: "Income"
          - name: ingested_at
            description: "Data ingestion timestamp"

  # =============================================================================
  # E-COMMERCE DATA (Olist Brazilian E-Commerce)
  # =============================================================================
  - name: olist_raw
    description: "Raw Olist Brazilian E-Commerce dataset (9 tables, 100k+ orders)"
    database: economic_data
    schema: bronze
    tables:
      - name: olist_orders
        description: "Orders with status and timestamps"
        columns:
          - name: order_id
            tests: [not_null, unique]
      - name: olist_order_items
        description: "Line items per order"
      - name: olist_customers
        description: "Customer data with geography"
        columns:
          - name: customer_id
            tests: [not_null, unique]
      - name: olist_products
        description: "Product catalog"
        columns:
          - name: product_id
            tests: [not_null, unique]
      - name: olist_sellers
        description: "Seller data with geography"
        columns:
          - name: seller_id
            tests: [not_null, unique]
      - name: olist_payments
        description: "Payment transactions per order"
      - name: olist_reviews
        description: "Customer reviews and ratings"
      - name: olist_geolocation
        description: "Zip code to lat/lng mapping"
      - name: olist_category_translation
        description: "Product category Portuguese to English"
