version: 2

models:
  - name: dim_customers
    description: "Customer dimension with spend-based segmentation"
    columns:
      - name: customer_unique_id
        tests: [not_null, unique]

  - name: dim_products
    description: "Product dimension with performance stats"
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: dim_sellers
    description: "Seller dimension with performance stats"
    columns:
      - name: seller_id
        tests: [not_null, unique]

  - name: dim_time
    description: "Date dimension covering full order date range"
    columns:
      - name: date_key
        tests: [not_null, unique]

  - name: fct_orders
    description: "Central order fact table with all metrics"
    columns:
      - name: order_id
        tests: [not_null, unique]

  - name: fct_order_items
    description: "Order line item fact table"
    columns:
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
