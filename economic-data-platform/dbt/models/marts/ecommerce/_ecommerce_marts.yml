version: 2

models:
  - name: dim_customers
    description: "Customer dimension with spend-based segmentation"
    columns:
      - name: customer_unique_id
        tests: [not_null, unique]

  - name: dim_products
    description: "Product dimension with performance stats"
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: dim_sellers
    description: "Seller dimension with performance stats"
    columns:
      - name: seller_id
        tests: [not_null, unique]

  - name: dim_time
    description: "Date dimension covering full order date range"
    columns:
      - name: date_key
        tests: [not_null, unique]

  - name: dim_geography
    description: "Geographic dimension — zip_code, city, state, region with coordinates"
    columns:
      - name: zip_code_prefix
        tests: [not_null, unique]
      - name: state
        tests: [not_null]
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['Sudeste', 'Sul', 'Nordeste', 'Centro-Oeste', 'Norte', 'Desconhecido']

  - name: fct_orders
    description: "Central order fact table with all metrics"
    columns:
      - name: order_id
        tests: [not_null, unique]

  - name: fct_order_items
    description: "Order line item fact table"
    columns:
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]

  - name: mart_sales
    description: "Daily sales KPIs with running totals and 7-day moving averages"
    columns:
      - name: order_date
        tests: [not_null, unique]

  - name: mart_sales_monthly
    description: "Monthly sales summary with MoM growth"
    columns:
      - name: month
        tests: [not_null, unique]

  - name: mart_customers
    description: "Customer mart with RFM segmentation, LTV, churn"
    columns:
      - name: customer_unique_id
        tests: [not_null, unique]
      - name: rfm_segment
        tests: [not_null]

  - name: mart_logistics
    description: "Daily logistics KPIs — delivery times, on-time rate, freight"
    columns:
      - name: order_date
        tests: [not_null, unique]

  - name: mart_logistics_by_state
    description: "Logistics performance by customer state"
    columns:
      - name: state
        tests: [not_null, unique]
