version: 2

models:
  - name: stg_olist_orders
    description: "Cleaned orders with delivery metrics"
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['delivered','shipped','canceled','unavailable','invoiced','processing','created','approved']

  - name: stg_olist_order_items
    description: "Order line items with total value"
    columns:
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: seller_id
        tests: [not_null]

  - name: stg_olist_customers
    description: "Customers with standardized geography"
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: customer_unique_id
        tests: [not_null]

  - name: stg_olist_products
    description: "Products with English categories and volume"
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: stg_olist_sellers
    description: "Sellers with standardized geography"
    columns:
      - name: seller_id
        tests: [not_null, unique]

  - name: stg_olist_payments
    description: "Payments with typed values"
    columns:
      - name: order_id
        tests: [not_null]
      - name: payment_type
        tests:
          - accepted_values:
              values: ['credit_card','boleto','voucher','debit_card','not_defined']

  - name: stg_olist_reviews
    description: "Reviews with response time"
    columns:
      - name: review_id
        tests: [not_null, unique]
      - name: order_id
        tests: [not_null]
      - name: review_score
        tests:
          - not_null
